<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066b2" />
      <stop offset="100%" stop-color="#003366" />
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#28a745" />
      <stop offset="100%" stop-color="#155724" />
    </linearGradient>
  </defs>

  <!-- Document Background -->
  <path d="M150 150 L350 150 L350 350 L150 350 Z" fill="#f8f9fa" stroke="#003366" stroke-width="8" />
  <path d="M170 180 L330 180" stroke="#ced4da" stroke-width="6" stroke-linecap="round" />
  <path d="M170 210 L330 210" stroke="#ced4da" stroke-width="6" stroke-linecap="round" />
  <path d="M170 240 L330 240" stroke="#ced4da" stroke-width="6" stroke-linecap="round" />
  <path d="M170 270 L280 270" stroke="#ced4da" stroke-width="6" stroke-linecap="round" />
  <path d="M170 300 L250 300" stroke="#ced4da" stroke-width="6" stroke-linecap="round" />

  <!-- Graduation Cap -->
  <path d="M250 50 L100 120 L250 170 L400 120 Z" fill="url(#gradBlue)" />
  <path d="M150 145 L150 200 Q250 230 350 200 L350 145" fill="none" stroke="#003366" stroke-width="12" />
  <path d="M120 130 L120 200" stroke="#d4af37" stroke-width="6" />
  <path d="M110 200 L130 200 L125 230 L115 230 Z" fill="#d4af37" />

  <!-- Circuit Board Lines -->
  <path d="M360 200 L420 200 L420 250 L380 280 L380 320" fill="none" stroke="#003366" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="420" cy="200" r="8" fill="#003366" />
  <circle cx="380" cy="320" r="8" fill="#003366" />
  <path d="M360 250 L400 250 L400 300 L360 330" fill="none" stroke="#003366" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="400" cy="250" r="8" fill="#003366" />

  <!-- Quill Pen -->
  <path d="M200 350 Q220 250 320 200 Q280 260 250 280 Q230 300 200 350 Z" fill="url(#gradGreen)" />
  <path d="M200 350 L180 380 L210 370 Z" fill="#003366" />
  <path d="M195 365 L185 365" stroke="#ffffff" stroke-width="2" />

  <!-- Swoosh -->
  <path d="M80 370 Q250 420 420 370" fill="none" stroke="#003366" stroke-width="12" stroke-linecap="round" />

  <!-- Text -->
  <text x="250" y="430" font-family="sans-serif" font-size="48" font-weight="bold" fill="#003366" text-anchor="middle">Bayano</text>
  <text x="250" y="470" font-family="sans-serif" font-size="36" font-weight="bold" fill="#155724" text-anchor="middle">Académie</text>
</svg>
